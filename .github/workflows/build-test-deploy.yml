name: Build, Test & Deploy
defaults:
  run:
    working-directory: frontend
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-and-test:
    timeout-minutes: 60
    name: "frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Install playwright
        run: npm init playwright@latest

      - name: Build frontend
        run: npx astro check && npx astro build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v3
        with: 
          name: frontend-artifact
          path: dist
        
      - name: Run Playwright Tests
        run: npx playwright test index.spec.ts
        
      - name: Upload playwright reports
        uses: actions/upload-artifact@v3
        with: 
          name: playwright-test_report
          path: frontend/playwright-report

  deploy:
    needs: build-and-test # Deze 'needs' zal ervoor zorgen dat de deploy enkel wordt uitgevoerd als de 'build-and-test' job succesvol is.
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Bestanden synchroniseren met server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}