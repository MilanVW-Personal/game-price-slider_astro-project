name: Build, Test & Deploy
defaults:
  run:
    working-directory: frontend
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-and-test:
    timeout-minutes: 60
    name: "frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Playwright installeren
        run: npm init playwright@latest && npx playwright install --with-deps

      - name: Build frontend
        run: npx astro check && npx astro build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with: 
          name: frontend-artifact
          path: frontend/dist/ # straks proberen error weg te werken
        
      - name: Run Playwright Tests
        run: npx playwright test index.spec.ts
        
      - name: Upload playwright reports
        uses: actions/upload-artifact@v4
        with: 
          name: playwright-test_report
          path: frontend/playwright-report

  deploy:
    # needs: build-and-test # Deze 'needs' zal ervoor zorgen dat de deploy enkel wordt uitgevoerd als de 'build-and-test' job succesvol is.
    name: 🚀 Deploy Website Every Commit
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get Latest Code (Checkout)
      uses: actions/checkout@v4

    - name: Download Artifact van Playwright
      uses: actions/download-artifact@v4
      with:
        name: frontend-artifact
        path: ./playwright-report/
    
    - name:  📂 Sync Files (bestanden synchroniseren met server)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}